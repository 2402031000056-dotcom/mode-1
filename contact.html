<!DOCTYPE html>
<html>
<head>
<title>Contact</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="header"></div>

<section class="py-5">
<div class="container">

<div class="form-box">
<h1>Contact Us</h1>

<form>
<input type="text" class="form-control mb-3" placeholder="Name">
<input type="email" class="form-control mb-3" placeholder="Email">
<textarea class="form-control mb-3" rows="5" placeholder="Message"></textarea>

<button class="btn btn-pink">Send Message</button>
</form>

</div>

</div>
</section>

<section class="faq-section">
<div class="container">

<h2 class="text-center mb-4">FAQ</h2>

<div class="accordion" id="faqAccordion">

<div class="accordion-item">
<h2 class="accordion-header">
<button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#faq1">
How to enroll?
</button>
</h2>
<div id="faq1" class="accordion-collapse collapse show">
<div class="accordion-body">
Choose course and complete payment.
</div>
</div>
</div>

<div class="accordion-item">
<h2 class="accordion-header">
<button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#faq2">
Do you provide certificate?
</button>
</h2>
<div id="faq2" class="accordion-collapse collapse">
<div class="accordion-body">
Yes we provide certificate after completion.
</div>
</div>
</div>

</div>

</div>
</section>

<div id="footer"></div>

<script>
fetch("header.html").then(res=>res.text()).then(data=>document.getElementById("header").innerHTML=data);
fetch("footer.html").then(res=>res.text()).then(data=>document.getElementById("footer").innerHTML=data);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
