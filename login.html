<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="header"></div>

<section class="py-5">
<div class="container">
<div class="row">

<div class="col-md-6">
<div class="form-box">
<h2>Login</h2>

<form>
<input type="email" class="form-control mb-3" placeholder="Email">
<input type="password" class="form-control mb-3" placeholder="Password">
<button class="btn btn-pink w-100">Login</button>
</form>

</div>
</div>

<div class="col-md-6">
<div class="form-box">
<h2>Register</h2>

<form>
<input type="text" class="form-control mb-3" placeholder="Name">
<input type="email" class="form-control mb-3" placeholder="Email">
<input type="password" class="form-control mb-3" placeholder="Password">
<button class="btn btn-pink w-100">Register</button>
</form>

</div>
</div>

</div>
</div>
</section>

<div id="footer"></div>

<script>
fetch("header.html").then(res=>res.text()).then(data=>document.getElementById("header").innerHTML=data);
fetch("footer.html").then(res=>res.text()).then(data=>document.getElementById("footer").innerHTML=data);
</script>

</body>
</html>
