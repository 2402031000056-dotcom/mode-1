<!DOCTYPE html>
<html>
<head>
<title>Payment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="header"></div>

<section class="py-5">
<div class="container">

<div class="form-box">
<h1>Payment Details</h1>

<form>
<input type="text" class="form-control mb-3" placeholder="Card Name">
<input type="text" class="form-control mb-3" placeholder="Card Number">
<input type="text" class="form-control mb-3" placeholder="Expiry Date">
<input type="text" class="form-control mb-3" placeholder="CVV">

<button class="btn btn-pink">Pay Now</button>
</form>

</div>

</div>
</section>

<div id="footer"></div>

<script>
fetch("header.html").then(res=>res.text()).then(data=>document.getElementById("header").innerHTML=data);
fetch("footer.html").then(res=>res.text()).then(data=>document.getElementById("footer").innerHTML=data);
</script>

</body>
</html>
