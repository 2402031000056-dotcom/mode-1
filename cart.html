<!DOCTYPE html>
<html>
<head>
<title>Cart</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="header"></div>

<section class="py-5">
<div class="container">

<h1>Your Cart</h1>

<div class="card p-4">

<div class="d-flex justify-content-between align-items-center">

<div>
<h4>Web Development Course</h4>
<p>$99</p>
</div>

<div class="price-box">
<button class="qty-btn" onclick="decrease()">-</button>
<span id="qty">1</span>
<button class="qty-btn" onclick="increase()">+</button>
</div>

</div>

<button class="btn btn-pink mt-4" data-bs-toggle="modal" data-bs-target="#cartModal">
Checkout
</button>

</div>

</div>
</section>

<div class="modal fade" id="cartModal">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">

<div class="modal-header">
<h5>Order Confirmed</h5>
<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">
Your course added successfully.
</div>

</div>
</div>
</div>

<div id="footer"></div>

<script>
let qty=1;

function increase(){
qty++;
document.getElementById("qty").innerText=qty;
}

function decrease(){
if(qty>1){
qty--;
document.getElementById("qty").innerText=qty;
}
}

fetch("header.html").then(res=>res.text()).then(data=>document.getElementById("header").innerHTML=data);
fetch("footer.html").then(res=>res.text()).then(data=>document.getElementById("footer").innerHTML=data);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
