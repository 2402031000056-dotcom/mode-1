<!DOCTYPE html>
<html>
<head>
<title>Courses</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="header"></div>

<section class="course-section">
<div class="container">

<h1 class="mb-5 text-center">All Courses</h1>

<div class="row g-4" id="courseContainer">

<div class="col-md-4 course-item">
<div class="card">
<img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085">
<div class="card-body">
<h5>HTML CSS Bootcamp</h5>
<a href="course-details.html" class="btn btn-pink">Details</a>
</div>
</div>
</div>

<div class="col-md-4 course-item d-none">
<div class="card">
<img src="https://images.unsplash.com/photo-1515879218367-8466d910aaa4">
<div class="card-body">
<h5>React Masterclass</h5>
<a href="#" class="btn btn-pink">Details</a>
</div>
</div>
</div>

</div>

<div class="text-center mt-4">
<button class="btn btn-pink" id="loadMore">Load More</button>
</div>

</div>
</section>

<div id="footer"></div>

<script>
fetch("header.html").then(res=>res.text()).then(data=>document.getElementById("header").innerHTML=data);
fetch("footer.html").then(res=>res.text()).then(data=>document.getElementById("footer").innerHTML=data);

document.getElementById("loadMore").addEventListener("click",function(){
document.querySelectorAll(".course-item.d-none").forEach(el=>el.classList.remove("d-none"));
this.style.display="none";
});
</script>

</body>
</html>
